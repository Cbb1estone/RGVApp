<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><title>Nueva Cuenta Bancaria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 500px;">
        <div class="card shadow">
            <div class="card-header bg-dark text-white"><h5><i class="bg-dark text-white"></i> Registrar Cuenta Bancaria</h5></div>
            <div class="card-body">
                <form method="POST"> {% csrf_token %}
                    <div class="mb-3"><label class="form-label">Nombre de Cuenta</label><input type="text" name="nombre" class="form-control" required placeholder="Ej: Nómina PYME"></div>
                    <div class="mb-3"><label class="form-label">Banco</label><input type="text" name="banco" class="form-control" required placeholder="Ej: BBVA"></div>
                    <div class="mb-3"><label class="form-label">Saldo Inicial</label><input type="number" step="0.01" name="saldo_actual" class="form-control" required placeholder="0.00"></div>
                    <button type="submit" class="btn btn-success w-100">Guardar Cuenta</button>
                    <a href="{% url 'dashboard' %}" class="btn btn-link w-100 mt-2 text-muted">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
