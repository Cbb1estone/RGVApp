<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Cuenta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 500px;">
        <div class="card shadow">
            <div class="card-header bg-dark text-white">
                <h5 class="mb-0"><i class="fa-solid fa-pen-to-square me-2 text-warning"></i>Editar Cuenta Bancaria</h5>
            </div>
            <div class="card-body">
                <form method="POST"> {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nombre de la Cuenta:</label>
                        <input type="text" name="nombre" class="form-control" value="{{ cuenta.nombre }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Banco:</label>
                        <input type="text" name="banco" class="form-control" value="{{ cuenta.banco }}" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">Saldo Actual ($):</label>
                        <input type="number" step="0.01" name="saldo_actual" class="form-control" value="{{ cuenta.saldo_actual }}" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Guardar Cambios</button>
                    <a href="{% url 'dashboard' %}" class="btn btn-link w-100 mt-2 text-muted">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
