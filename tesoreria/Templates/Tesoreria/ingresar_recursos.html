<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ingresar Recursos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 500px;">
        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h5 class="mb-0"><i class="fa-solid fa-money-bill-trend-up me-2"></i>Ingresar Recursos a Cuenta</h5>
            </div>
            <div class="card-body">
                <form method="POST"> {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">Selecciona la Cuenta Destino:</label>
                        <select name="cuenta" class="form-select" required>
                            <option value="" disabled selected>-- Selecciona una cuenta --</option>
                            {% for cuenta in cuentas %}
                                <option value="{{ cuenta.id }}">{{ cuenta.nombre }} ({{ cuenta.banco }}) — Actual: ${{ cuenta.saldo_actual }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Monto a Depositar ($):</label>
                        <input type="number" step="0.01" min="0.01" name="monto" class="form-control form-control-lg text-success fw-bold" placeholder="0.00" required>
                    </div>

                    <button type="submit" class="btn btn-success w-100 btn-lg">Confirmar Depósito</button>
                    <a href="{% url 'dashboard' %}" class="btn btn-link w-100 mt-2 text-muted">Cancelar y volver</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
