<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><title>Nuevo Gasto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 500px;">
        <div class="card shadow">
            <div class="card-header bg-dark text-white"><h5>Registrar Nuevo Gasto</h5></div>
            <div class="card-body">
                <form method="POST"> {% csrf_token %}
                    <div class="mb-3"><label class="form-label">Descripción del Gasto</label><input type="text" name="descripcion" class="form-control" required placeholder="Ej: Pago de Servidores AWS"></div>
                    <div class="mb-3"><label class="form-label">Monto Total</label><input type="number" step="0.01" name="monto_total" class="form-control" required placeholder="0.00"></div>
                    <button type="submit" class="btn btn-danger w-100">Registrar Gasto</button>
                    <a href="{% url 'dashboard' %}" class="btn btn-link w-100 mt-2 text-muted">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
