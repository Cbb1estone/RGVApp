<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Control Financiero</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="card shadow" style="width: 100%; max-width: 400px;">
        <div class="card-header bg-dark text-white text-center py-3">
            <h5 class="mb-0"><i class="fa-solid fa-vault me-2 text-warning"></i>Control Financiero</h5>
        </div>
        <div class="card-body p-4">
            
            {% if form.errors %}
                <div class="alert alert-danger py-2 small" role="alert">
                    <i class="fa-solid fa-triangle-exclamation me-1"></i> Usuario o contraseña incorrectos.
                </div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted">Usuario:</label>
                    <input type="text" name="username" class="form-control" placeholder="Tu usuario" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted">Contraseña:</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 mt-2">Ingresar al Panel</button>
            </form>

        </div>
        <div class="card-footer text-center bg-white border-0 pb-3">
            <small class="text-muted">Usa una cuenta registrada en el panel de /admin</small>
        </div>
    </div>

</body>
</html>
